<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pastel Sticky Notes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&family=Patrick+Hand&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app-shell">
    <section class="hero-card">
      <p class="eyebrow">Little Note Garden</p>
      <h1>Sticky Notes</h1>
      <p class="intro">
        Write in English or Brazilian Portuguese on top, and each note softly translates itself in the bottom half.
      </p>
      <p id="sync-status" class="sync-status">Checking shared notes connection...</p>
      <button id="add-note-button" class="add-note-button" type="button">+ Add a note</button>
    </section>

    <section class="board-wrap">
      <div id="notes-board" class="notes-board" aria-live="polite">
        <div id="notes-canvas" class="notes-canvas"></div>
      </div>
    </section>
  </main>

  <template id="note-template">
    <article class="note" data-note-id="">
      <button class="delete-note-button" type="button" aria-label="Delete note">x</button>
      <div class="note-halves">
        <div class="note-pane note-pane-top">
          <label class="sr-only" for="">Original note text</label>
          <p class="pane-title">Write here</p>
          <textarea class="note-text note-source-text" rows="5" placeholder="Type in English or Brazilian Portuguese..."></textarea>
        </div>
        <div class="note-pane note-pane-bottom">
          <p class="pane-title">Auto translation</p>
          <p class="translation-status" aria-live="polite"></p>
          <div class="note-translation" aria-live="polite"></div>
        </div>
      </div>
      <div class="note-footer">
        <span class="drag-hint">Drag me around</span>
      </div>
    </article>
  </template>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="script.js"></script>
</body>
</html>
