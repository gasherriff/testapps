<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pastel Sticky Notes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&family=Patrick+Hand&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app-shell">
    <section class="hero-card">
      <p class="eyebrow">Little Note Garden</p>
      <h1>Sticky Notes</h1>
      <p class="intro">
        Add sweet little reminders, scatter them around the board, and everything stays saved in your browser.
      </p>
      <button id="add-note-button" class="add-note-button" type="button">+ Add a note</button>
    </section>

    <section class="board-wrap">
      <div id="notes-board" class="notes-board" aria-live="polite"></div>
    </section>
  </main>

  <template id="note-template">
    <article class="note" data-note-id="">
      <button class="delete-note-button" type="button" aria-label="Delete note">x</button>
      <label class="sr-only" for="">Note text</label>
      <textarea class="note-text" rows="7" placeholder="Write something lovely..."></textarea>
      <div class="note-footer">
        <span class="drag-hint">Drag me around</span>
      </div>
    </article>
  </template>

  <script src="script.js"></script>
</body>
</html>
